<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div1{
            border: 5px solid;
            width: fit-content;
            padding: 100px 100px;
        }
        .div2{
            border: 5px dotted;
            width: fit-content;
            border-color: aquamarine;
            padding: 100px 100px;
        }
        .div3{
            border: 5px dashed;
            width: fit-content;
            border-color: chartreuse;
            padding: 100px 100px;
        }
        .div4{
            width: fit-content;
            border: 5px double palevioletred;
            padding: 100px 100px;
        }
    </style>
</head>
<body>
    <div class="div1">hello</div>
    <div class="div2">how</div>
    <div class="div3">are</div>
    <div class="div4">you</div>
</body>
</html>
