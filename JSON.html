<!DOCTYPE html>
<html>
<head>
    <title>JSON Example</title>
</head>
<body>

<h2>JSON Demo</h2>

<button onclick="showData()">Show Data</button>

<p id="output"></p>

<script>
    // JSON data (as string)
    let jsonData = `{
        "name": "Rohit",
        "age": 21,
        "city": "Bangalore"
    }`;

    // Convert JSON string → JavaScript object
    let obj = JSON.parse(jsonData);

    function showData() {
        document.getElementById("output").innerText =
            "Name: " + obj.name +
            ", Age: " + obj.age +
            ", City: " + obj.city;
    }
</script>

</body>
</html>
