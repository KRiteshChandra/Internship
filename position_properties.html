<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div1{
            height: 100px;
            width: 100px;
            position: absolute;
            background-color: blue;
        }
        .div2{
            height: 100px;
            width: 100px;
            position: absolute;
            background-color: gold;
        }
        .div3{
            height: 100px;
            width: 100px;
            position: absolute;
            top: 50px;
            right: 10px;
            background-color: red;
        }
        .div4{
            height: 100px;
            width: 100px;
            position: absolute;
            background-color: green;
            top:30px;
            left: 50px;
        }
    </style>
</head>
<body>
    <div class="div1"></div>
    <div class="div2"></div>
    <div class="div3"></div>
    <div class="div4"></div>
</body>
</html>
